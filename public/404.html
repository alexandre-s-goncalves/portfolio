<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Alexandre Gonçalves | Portfolio</title>
    <script type="text/javascript">
      var l = window.location;
      var isQas = l.pathname.includes('/portfolio/qas/');
      var pathSegmentsToKeep = isQas ? 3 : 2;

      var repoPath = l.pathname
        .split('/')
        .slice(0, pathSegmentsToKeep)
        .join('/');
      var routePath = l.pathname.slice(repoPath.length);

      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          repoPath +
          '/?p=' +
          encodeURIComponent(routePath) +
          (l.search ? '&' + l.search.slice(1) : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
